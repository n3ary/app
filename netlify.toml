[build]
  command = "npm run build"
  publish = "build"

# Local `netlify dev` configuration.
# `#custom` disables framework auto-detection and proxies to the Vite dev
# server. Runs the command, waits for targetPort, then serves on port 8888.
[dev]
  command = "npm run dev"
  targetPort = 5173
  framework = "#custom"
  publish = "build"

# API proxy redirects (must come BEFORE the SPA redirect)
[[redirects]]
  from = "/api/tranzy/*"
  to = "https://api.tranzy.ai/:splat"
  status = 200
  force = true

# GTFS-RT feeds are protobuf-binary and don't expose CORS. Proxy them so
# the client can fetch /api/rt/<feed>/<endpoint> regardless of origin.
# Mirrors the dev-time Vite proxy in apps/web/vite.config.ts.
[[redirects]]
  from = "/api/rt/cluj-napoca/*"
  to = "https://cluj-rt-feed.gtfs.ro/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/rt/bucuresti-ilfov/*"
  to = "https://gtfs.tpbi.ro/api/gtfs-rt/:splat"
  status = 200
  force = true

# Prevent caching on API proxy responses
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# SvelteKit's version-poll manifest — MUST NOT be cached, otherwise
# the client can't detect new deploys. See svelte.config.js `kit.version`.
[[headers]]
  for = "/_app/version.json"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

# HTML shell — always revalidate so a new deploy is picked up the
# next time the user lands on the page. The hashed JS / CSS inside
# `/_app/immutable/*` stays cached aggressively via the rule below.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# SPA redirect for client-side routing (no force — static files take precedence)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for better performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
