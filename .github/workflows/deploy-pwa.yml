# ----------------------------------------------------------------------------
# [deploy] PWA to Cloudflare Pages (on push to main + manual)
#
# Builds the PWA and deploys to the Cloudflare Pages project 'neary'
# (app.n3ary.com) on every push to main. Manual trigger exists for
# the case where secrets / config changed but the code didn't.
#
# Trigger:     push to main, manual
# Permissions: contents: read
# Secrets:     NPM_TOKEN, CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
# Owner:       @ciotlosm
# Run time:    ~3-5 min
# ----------------------------------------------------------------------------
name: '[deploy] PWA to Cloudflare Pages (on push to main + manual)'

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deploy at a time; cancel in-progress if a new merge lands.
concurrency:
  group: production-deploy
  cancel-in-progress: true

# Contents: read so we can check out the source.
# The @n3ary/gtfs-spec install uses the NPM_TOKEN secret
# (an org token with read:packages on the org) rather than the
# GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  deploy:
    # Skip deploy when the release bot (n3ary-release-bot) is the actor.
    # The bot's release/calver-* PRs land on main as a squash merge; the
    # `push` event fires with `github.actor = n3ary-release-bot[bot]`.
    # Deploying a version-only commit would re-run a deploy whose
    # artefact is byte-identical to the previous one. The release bot
    # bumps `package.json#version`; nothing else changes.
    if: github.actor == 'n3ary-release-bot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        # No explicit `version:` - pnpm/action-setup would conflict with
        # the `packageManager: pnpm@<X.Y.Z>` field in package.json
        # (the action errors with "Multiple versions of pnpm specified"
        # when both are present). Auto-detect from packageManager instead;
        # that is the org-wide source of truth per the pr-validation
        # workflow and the n3ary/actions v22 shared action.
        # The pnpm cache key in setup-node derives from the same
        # auto-detected version, so cache hits still work.

      - name: Install dependencies
        # The @n3ary scope maps to GitHub Packages (see .npmrc).
        # NPM_TOKEN is an org token with read:packages on @n3ary/gtfs-spec.
        # Set via the repo's secrets in GitHub web UI.
        #
        # pnpm 11 refuses to expand env vars in project .npmrc (it
        # considers the file committed and could leak the secret to
        # an attacker-controlled registry). Use `pnpm config set`
        # to write the credential to user-level ~/.npmrc at install
        # time -- that's an untracked, per-run path.
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm config set //npm.pkg.github.com/:_authToken "$NPM_TOKEN"
          pnpm install --frozen-lockfile

      - name: Build production bundle
        run: pnpm run build

      # Deploy the static build to Cloudflare Pages via wrangler.
      # Wrangler reads CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID from
      # the environment; the token needs the "Cloudflare Pages: Edit"
      # scope. Custom domain (app.n3ary.com) is attached to the project
      # once (out of band); each deploy is picked up automatically.
      #
      # The Cloudflare Pages project is still named 'neary' even after
      # the repo rename. Renaming a Pages project would orphan the
      # custom-domain binding until re-attached, so we keep the
      # deploy-time reference as 'neary'. Same rationale as the
      # OPFS_POOL_NAME='neary-gtfs' + 'neary-gtfs' R2 bucket note in
      # the rename commit body: published/data artifacts keep their
      # old names, only the source-side references change.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # --commit-dirty=true silences wrangler's "uncommitted changes"
          # warning. The wrangler-action@v4 auto-runs `pnpm add wrangler@4`
          # which mutates package.json + pnpm-lock.yaml in the runner's
          # working tree; wrangler then sees the dirty tree. The mutation
          # is ephemeral (the runner is fresh per deploy) and never
          # touches the real repo, so just acknowledge it.
          command: pages deploy build --project-name=neary --branch=main --commit-dirty=true
